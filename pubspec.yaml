name: wasap
description: "WASap - Sapa Lebih Mudah. A WhatsApp contact launcher with Indonesian phone number normalization."
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # External URL launcher for WhatsApp
  url_launcher: ^6.2.2

  # Typography
  google_fonts: ^6.1.0

  # Internationalization
  intl: any

  # Local persistence
  shared_preferences: ^2.2.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Riverpod code generation
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  generate: true
